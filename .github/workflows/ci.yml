# CI Workflow — mcp-forge
#
# Covers:
#   NFR-002: Cross-platform compatibility (macOS, Windows, Linux)
#   TC-INT-FR003-01: PostgreSQL integration test (Linux only — Docker services not available on macOS/Windows runners)
#   TC-INT-NFR002-01/02/03: Platform-specific scaffold + Claude Desktop config paths

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────
  # TC-INT-NFR002-01: macOS runner
  # Note: No Docker on macOS runners — DB test skipped (no DATABASE_URL)
  # ──────────────────────────────────────────────
  test-macos:
    name: "TC-INT-NFR002-01 — macOS"
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests (unit + contract + integration, no DB)
        run: npm test

  # ──────────────────────────────────────────────
  # TC-INT-NFR002-02: Windows runner
  # ──────────────────────────────────────────────
  test-windows:
    name: "TC-INT-NFR002-02 — Windows"
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests (no DB — unit + contract only)
        run: npm test

  # ──────────────────────────────────────────────
  # TC-INT-NFR002-03: Linux runner
  # ──────────────────────────────────────────────
  test-linux:
    name: "TC-INT-NFR002-03 — Linux (Ubuntu)"
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run all tests (including DB integration)
        run: npm test
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb
